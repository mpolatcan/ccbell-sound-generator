name: Build Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon) - builds universal binary
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          # Linux x64
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name || 'dev' }}
          releaseName: "CCBell Sound Generator ${{ github.ref_name || 'dev' }}"
          releaseBody: |
            ## CCBell Sound Generator Desktop App

            Download the installer for your platform below.

            ### First Launch
            - The app will automatically install Python 3.12 and all dependencies on first launch
            - This requires an internet connection and takes 1-2 minutes
            - Subsequent launches start instantly

            ### Requirements
            - **macOS**: macOS 10.15 (Catalina) or later
            - **Linux**: Ubuntu 22.04+ or equivalent (libwebkit2gtk-4.1, libsndfile1)
            - **Internet**: Required on first launch to download Python and ML dependencies
          releaseDraft: ${{ github.event.inputs.draft || false }}
          prerelease: false
          args: ${{ matrix.args }}
