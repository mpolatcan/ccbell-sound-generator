## Oracle Cloud Free Tier deployment
## Usage: docker compose -f docker-compose.oracle.yml up -d
services:
  ccbell:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    image: ccbell-sound-generator:latest
    container_name: ccbell
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # Persist model cache across container restarts
      - ccbell-models:/home/user/.cache/huggingface
      # Persist generated audio
      - ccbell-audio:/tmp/ccbell-audio
    environment:
      - CCBELL_DEBUG=false
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    deploy:
      resources:
        limits:
          memory: 8g

volumes:
  ccbell-models:
  ccbell-audio:
